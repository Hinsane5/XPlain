# CI — runs the validation gates from AGENTS.md on every push / PR.
#
# NOTE: this stays RED until the Xcode project + toolchain exist (build-plan
# Phase 0). That is expected. Do not treat a red badge as a bug before Phase 0
# lands; the workflow is committed alongside the first real code.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install SwiftLint & swift-format
        run: brew install swiftlint swift-format

      - name: Lint
        run: swiftlint --strict

      - name: Format check
        run: swift-format lint --recursive Sources Tests

      # project.yml pins DEVELOPMENT_TEAM for local builds so Screen Recording
      # permission persists across rebuilds (see project.yml). CI's runner has no
      # access to that Personal Team cert, so override signing back to ad-hoc here
      # — CI only needs to build + run tests, not hold any TCC grant.
      - name: Build & test
        run: |
          xcodebuild -scheme XPlain -destination 'platform=macOS' build test \
            CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="-" DEVELOPMENT_TEAM=""
