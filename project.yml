# Regenerate via `scripts/generate-project.sh`, not `xcodegen generate`
# directly — the script also patches objectVersion down to a value CI's
# pinned Xcode 15.4 can read (see the script's comment for why).
name: XPlain
options:
  bundleIdPrefix: com.howardgoh
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    exactVersion: 1.9.4

targets:
  XPlain:
    type: application
    platform: macOS
    sources:
      - path: Sources/XPlain
    settings:
      base:
        INFOPLIST_FILE: XPlain/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.howardgoh.XPlain
        CODE_SIGN_STYLE: Automatic
        ENABLE_TESTABILITY: YES
    dependencies:
      - package: KeyboardShortcuts

  XPlainTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/XPlainTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: XPlain
      - package: KeyboardShortcuts

schemes:
  XPlain:
    build:
      targets:
        XPlain: all
        XPlainTests: [test]
    test:
      config: Debug
      targets:
        - XPlainTests
    run:
      config: Debug
