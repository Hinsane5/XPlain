name: XPlain
options:
  bundleIdPrefix: com.howardgoh
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  XPlain:
    type: application
    platform: macOS
    sources:
      - path: Sources/XPlain
    settings:
      base:
        INFOPLIST_FILE: XPlain/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.howardgoh.XPlain
        CODE_SIGN_STYLE: Automatic
        ENABLE_TESTABILITY: YES

schemes:
  XPlain:
    build:
      targets:
        XPlain: all
    run:
      config: Debug
